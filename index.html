<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Brush — Border Editing Tool</title>
    <link rel="icon" type="image/png" href="border_brush_icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

        .bg-checkered {
            background-image:
                linear-gradient(45deg, #1a1c23 25%, transparent 25%),
                linear-gradient(-45deg, #1a1c23 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1c23 75%),
                linear-gradient(-45deg, transparent 75%, #1a1c23 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-fade {
            animation: fadeIn 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#0b0c10] text-gray-100 min-h-screen font-sans antialiased selection:bg-white selection:text-black">

    <div class="flex flex-col lg:flex-row h-screen overflow-hidden">

        <aside class="w-full lg:w-80 bg-[#12141c] border-b lg:border-b-0 lg:border-r border-gray-800 p-6 flex flex-col justify-between overflow-y-auto shrink-0 z-10 shadow-xl">
            <div class="flex flex-col h-full">
              <div class="mb-6 flex justify-between items-start shrink-0">
              <div class="flex items-center gap-3">
                  <img src="border_brush_icon.png" alt="Logo" class="w-8 h-8 rounded-lg">
                  <div>
                      <h1 class="text-xl font-medium tracking-tight text-white">
                          Border Brush
                      </h1>
                      <p class="text-xs text-gray-400 mt-0.5">Border Editing Tool</p>
                  </div>
              </div>
            </div>

                <div class="relative flex-1 mt-2">

                    <div id="settingsOverlay" class="absolute inset-0 z-10 flex items-start justify-center pt-8 bg-[#12141c]/90 backdrop-blur-sm transition-opacity duration-300">
                        <p class="text-xs font-medium text-gray-400 tracking-wide text-center leading-relaxed">Select an image to start<br>configuring the border.</p>
                    </div>

                    <div id="settingsPanel" class="space-y-6 opacity-30 pointer-events-none transition-opacity duration-300 pt-2">

                        <div class="flex items-center justify-between border-b border-gray-800 pb-4">
                            <span class="text-xs font-semibold tracking-wider uppercase text-gray-300">Settings</span>
                            <button id="syncAllBtn" class="text-[10px] uppercase tracking-wider font-bold bg-gray-800 hover:bg-gray-700 text-white py-1 px-2 rounded transition-colors" title="Apply these settings to all uploaded images">
                                Sync to All
                            </button>
                        </div>

                        <div>
                            <label class="flex justify-between text-xs font-medium text-gray-400 mb-2 tracking-wider uppercase">
                                Border Width
                            </label>
                            <div class="flex gap-3 items-center">
                                <input type="range" id="borderWidth" min="0" max="400" value="24" class="flex-1 accent-white cursor-pointer bg-gray-800 rounded-lg appearance-none h-1.5">
                                <input type="number" id="borderWidthNum" min="0" max="2000" value="24" class="w-16 bg-[#1a1d28] border border-gray-700 rounded px-2 py-1 text-sm text-center text-white focus:outline-none focus:border-gray-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-2 tracking-wider uppercase">Border Colour</label>
                            <div class="flex items-center gap-3 bg-[#1a1d28] p-2.5 rounded-lg border border-gray-800">
                                <input type="color" id="borderColor" value="#ffffff" class="w-8 h-8 rounded border-0 bg-transparent cursor-pointer">
                                <input type="text" id="colorText" value="#ffffff" class="bg-transparent text-sm font-mono tracking-widest text-white focus:outline-none w-full uppercase">
                            </div>
                        </div>

                        <div>
                            <label class="flex justify-between text-xs font-medium text-gray-400 mb-2 tracking-wider uppercase">
                                Image Corner Curve
                            </label>
                            <div class="flex gap-3 items-center">
                                <input type="range" id="borderRadius" min="0" max="200" value="0" class="flex-1 accent-white cursor-pointer bg-gray-800 rounded-lg appearance-none h-1.5">
                                <input type="number" id="borderRadiusNum" min="0" max="1000" value="0" class="w-16 bg-[#1a1d28] border border-gray-700 rounded px-2 py-1 text-sm text-center text-white focus:outline-none focus:border-gray-500">
                            </div>
                        </div>

                        <div>
                            <label class="flex justify-between text-xs font-medium text-gray-400 mb-2 tracking-wider uppercase">
                                Outer Corner Curve
                            </label>
                            <div class="flex gap-3 items-center">
                                <input type="range" id="outerRadius" min="0" max="200" value="0" class="flex-1 accent-white cursor-pointer bg-gray-800 rounded-lg appearance-none h-1.5">
                                <input type="number" id="outerRadiusNum" min="0" max="1000" value="0" class="w-16 bg-[#1a1d28] border border-gray-700 rounded px-2 py-1 text-sm text-center text-white focus:outline-none focus:border-gray-500">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-800 space-y-3 shrink-0">
                <button id="addImagesBtn" class="hidden w-full py-2 bg-gray-800 hover:bg-gray-700 text-white text-xs font-medium rounded-lg transition-all duration-200">
                    Add More Images
                </button>
                <button id="downloadAllBtn" class="hidden w-full py-3 bg-white hover:bg-gray-100 disabled:bg-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed text-black font-medium text-sm rounded-lg transition-all duration-200 flex items-center justify-center gap-2 shadow-sm">
                    Download All (.zip)
                </button>
                <button id="clearBtn" class="hidden w-full py-2 bg-transparent hover:bg-gray-900 text-gray-400 hover:text-white text-xs font-medium rounded-lg transition-all duration-200">
                    Clear Images
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#0b0c10] relative">

            <div id="topNav" class="absolute top-0 left-0 right-0 p-4 z-20 flex justify-between items-center hidden pointer-events-none">
                <button id="backToGridBtn" class="pointer-events-auto flex items-center gap-2 text-sm font-medium bg-[#12141c]/80 backdrop-blur border border-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-lg transition-all shadow-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Grid
                </button>
                <button id="removeCurrentBtn" class="pointer-events-auto flex items-center gap-2 text-sm font-medium bg-red-500/10 border border-red-500/30 hover:bg-red-500/20 text-red-400 px-4 py-2 rounded-lg transition-all shadow-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Remove
                </button>
            </div>

            <div id="workspace" class="flex-1 w-full h-full p-6 overflow-y-auto flex flex-col items-center justify-center relative">
                <div id="dropzone" class="border border-dashed border-gray-800 hover:border-gray-600 rounded-xl max-w-xl w-full p-12 text-center cursor-pointer transition-all duration-200 group flex flex-col items-center justify-center">
                    <input type="file" id="fileInput" multiple accept="image/jpeg,image/png" class="hidden">
                    <svg class="w-8 h-8 text-gray-500 group-hover:text-gray-300 mb-4 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
                    <p class="text-sm font-medium text-gray-300">Upload your images here</p>
                    <p class="text-xs text-gray-500 mt-1">Supports high-res JPEG and PNG files</p>
                </div>

                <div id="previewGrid" class="hidden w-full h-full grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 auto-rows-max pb-12">
                </div>
            </div>

            <div id="detailView" class="hidden absolute inset-0 bg-[#0b0c10] bg-checkered overflow-hidden cursor-grab">
                <div id="transformWrapper" class="absolute left-1/2 top-1/2 shadow-2xl origin-top-left flex-shrink-0" style="will-change: transform;">
                    <img id="detailImage" src="" class="block max-w-none pointer-events-none">
                </div>
            </div>

        </main>
    </div>

    <canvas id="processingCanvas" class="hidden"></canvas>

    <script>
        let uploadedImages = [];
        let selectedId = null;
        let scale = 1, panX = 0, panY = 0;
        let isDragging = false, startX = 0, startY = 0, initialPanX = 0, initialPanY = 0;

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const previewGrid = document.getElementById('previewGrid');
        const detailView = document.getElementById('detailView');
        const transformWrapper = document.getElementById('transformWrapper');
        const detailImage = document.getElementById('detailImage');
        const topNav = document.getElementById('topNav');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');

        const bwSlider = document.getElementById('borderWidth');
        const bwNum = document.getElementById('borderWidthNum');
        const bcPicker = document.getElementById('borderColor');
        const bcText = document.getElementById('colorText');
        const brSlider = document.getElementById('borderRadius');
        const brNum = document.getElementById('borderRadiusNum');
        const outerSlider = document.getElementById('outerRadius');
        const outerNum = document.getElementById('outerRadiusNum');

        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const backToGridBtn = document.getElementById('backToGridBtn');
        const syncAllBtn = document.getElementById('syncAllBtn');
        const removeCurrentBtn = document.getElementById('removeCurrentBtn');
        const addImagesBtn = document.getElementById('addImagesBtn');
        const processingCanvas = document.getElementById('processingCanvas');

        ['dragenter', 'dragover'].forEach(e => workspace.addEventListener(e, (ev) => { ev.preventDefault(); dropzone.classList.add('border-gray-400'); }, false));
        ['dragleave', 'drop'].forEach(e => workspace.addEventListener(e, (ev) => { ev.preventDefault(); dropzone.classList.remove('border-gray-400'); }, false));
        workspace.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        addImagesBtn.addEventListener('click', () => fileInput.click());

        function updateButtonVisibility() {
            if (uploadedImages.length >= 1) {
                addImagesBtn.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
            } else {
                addImagesBtn.classList.add('hidden');
                clearBtn.classList.add('hidden');
            }
            if (uploadedImages.length > 1) {
                downloadAllBtn.classList.remove('hidden');
            } else {
                downloadAllBtn.classList.add('hidden');
            }
        }

        function handleFiles(files) {
            const validFiles = Array.from(files).filter(f => f.type === 'image/jpeg' || f.type === 'image/png');
            let loadedCount = 0;
            validFiles.forEach((file) => {
                const previewUrl = URL.createObjectURL(file);
                const img = new Image();
                img.src = previewUrl;
                img.onload = () => {
                    uploadedImages.push({
                        id: Math.random().toString(36).substr(2, 9),
                        file: file,
                        name: file.name,
                        type: file.type,
                        previewUrl: previewUrl,
                        naturalWidth: img.naturalWidth,
                        naturalHeight: img.naturalHeight,
                        borderW: 24,
                        color: '#ffffff',
                        radius: 0,
                        outerRadius: 0
                    });
                    loadedCount++;
                    if (loadedCount === validFiles.length) {
                        updateButtonVisibility();
                        if (uploadedImages.length === 1 && !selectedId) {
                            openDetailView(uploadedImages[0].id);
                        } else {
                            renderGrid();
                            if(selectedId) updateNav();
                        }
                    }
                };
            });
        }

        function renderGrid() {
            selectedId = null;
            settingsPanel.classList.add('opacity-30', 'pointer-events-none');
            settingsOverlay.classList.remove('hidden', 'opacity-0');
            settingsOverlay.classList.add('flex');
            detailView.classList.add('hidden');
            topNav.classList.add('hidden');
            workspace.classList.remove('hidden');

            if (uploadedImages.length === 0) {
                dropzone.classList.remove('hidden');
                previewGrid.classList.add('hidden');
                return;
            }

            dropzone.classList.add('hidden');
            previewGrid.classList.remove('hidden');
            previewGrid.innerHTML = '';
            uploadedImages.forEach(img => {
                const card = document.createElement('div');
                card.className = "bg-[#12141c] border border-gray-800 rounded-xl p-4 flex flex-col group hover:border-gray-600 transition-all cursor-pointer relative";
                card.onclick = (e) => { if(!e.target.closest('button')) openDetailView(img.id); };
                const s = 0.25;
                card.innerHTML = `
                    <button onclick="removeImage('${img.id}')" class="absolute top-2 right-2 p-1.5 bg-black/50 hover:bg-red-500 text-white rounded-lg transition-colors z-10 opacity-0 group-hover:opacity-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="relative flex-1 flex items-center justify-center bg-black/40 rounded-lg overflow-hidden h-[240px] p-4">
                        <div style="background-color: ${img.color}; padding: ${Math.max(2, img.borderW * s)}px; border-radius: ${img.outerRadius * s}px;">
                            <img src="${img.previewUrl}" class="max-w-full max-h-[200px] object-contain" style="border-radius: ${img.radius * s}px;">
                        </div>
                    </div>
                    <div class="mt-4 flex items-center justify-between gap-4">
                        <div class="min-w-0">
                            <p class="text-xs font-medium text-gray-200 truncate">${img.name}</p>
                            <p class="text-[10px] text-gray-500 font-mono mt-0.5">${img.naturalWidth} × ${img.naturalHeight} px</p>
                        </div>
                        <button onclick="downloadSingle('${img.id}')" class="shrink-0 p-2 bg-gray-800 hover:bg-white text-gray-400 hover:text-black rounded-lg transition-colors duration-200">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </button>
                    </div>
                `;
                previewGrid.appendChild(card);
            });
        }

        function openDetailView(id) {
            selectedId = id;
            const img = uploadedImages.find(i => i.id === id);
            if (!img) return;
            syncInputsToState(img);
            settingsPanel.classList.remove('opacity-30', 'pointer-events-none');
            settingsOverlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => settingsOverlay.classList.add('hidden'), 300);
            workspace.classList.add('hidden');
            detailView.classList.remove('hidden');
            topNav.classList.remove('hidden');
            updateNav();
            detailImage.src = img.previewUrl;
            void detailView.offsetWidth;
            panX = 0; panY = 0;
            const screenW = detailView.clientWidth;
            const screenH = detailView.clientHeight;
            const totalW = img.naturalWidth + (img.borderW * 2);
            const totalH = img.naturalHeight + (img.borderW * 2);
            scale = Math.min((screenW - 80) / totalW, (screenH - 80) / totalH, 1);
            if (scale <= 0) scale = 0.1;
            updateDetailStyling();
            transformWrapper.classList.remove('animate-fade');
            void transformWrapper.offsetWidth;
            transformWrapper.classList.add('animate-fade');
        }

        function updateNav() {
            if (uploadedImages.length > 1) {
                backToGridBtn.classList.remove('hidden');
            } else {
                backToGridBtn.classList.add('hidden');
            }
        }

        const updateStateFromInputs = () => {
            if (!selectedId) return;
            const img = uploadedImages.find(i => i.id === selectedId);
            img.borderW = parseInt(bwNum.value) || 0;
            img.color = bcText.value;
            img.radius = parseInt(brNum.value) || 0;
            img.outerRadius = parseInt(outerNum.value) || 0;
            updateDetailStyling();
        };

        bwSlider.addEventListener('input', (e) => { bwNum.value = e.target.value; updateStateFromInputs(); });
        bwNum.addEventListener('input', (e) => { bwSlider.value = e.target.value; updateStateFromInputs(); });
        bcPicker.addEventListener('input', (e) => { bcText.value = e.target.value.toUpperCase(); updateStateFromInputs(); });
        bcText.addEventListener('input', (e) => { if(/^#[0-9A-F]{6}$/i.test(e.target.value)) { bcPicker.value = e.target.value; updateStateFromInputs(); } });
        brSlider.addEventListener('input', (e) => { brNum.value = e.target.value; updateStateFromInputs(); });
        brNum.addEventListener('input', (e) => { brSlider.value = e.target.value; updateStateFromInputs(); });
        outerSlider.addEventListener('input', (e) => { outerNum.value = e.target.value; updateStateFromInputs(); });
        outerNum.addEventListener('input', (e) => { outerSlider.value = e.target.value; updateStateFromInputs(); });

        function syncInputsToState(img) {
            bwSlider.value = img.borderW; bwNum.value = img.borderW;
            bcPicker.value = img.color; bcText.value = img.color.toUpperCase();
            brSlider.value = img.radius; brNum.value = img.radius;
            outerSlider.value = img.outerRadius; outerNum.value = img.outerRadius;
        }

        function updateDetailStyling() {
            if (!selectedId) return;
            const img = uploadedImages.find(i => i.id === selectedId);
            const totalW = img.naturalWidth + (img.borderW * 2);
            const totalH = img.naturalHeight + (img.borderW * 2);
            transformWrapper.style.backgroundColor = img.color;
            transformWrapper.style.padding = `${img.borderW}px`;
            transformWrapper.style.borderRadius = `${img.outerRadius}px`;
            detailImage.style.borderRadius = `${img.radius}px`;
            const offsetX = panX - ((totalW * scale) / 2);
            const offsetY = panY - ((totalH * scale) / 2);
            transformWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        syncAllBtn.addEventListener('click', () => {
            if (!selectedId) return;
            const active = uploadedImages.find(i => i.id === selectedId);
            uploadedImages.forEach(img => {
                img.borderW = active.borderW;
                img.color = active.color;
                img.radius = active.radius;
                img.outerRadius = active.outerRadius;
            });
            syncAllBtn.textContent = "Synced!";
            setTimeout(() => syncAllBtn.textContent = "Sync to All", 1500);
        });

        function removeImage(id) {
            uploadedImages = uploadedImages.filter(i => i.id !== id);
            updateButtonVisibility();
            if (selectedId === id) {
                if (uploadedImages.length > 0) openDetailView(uploadedImages[0].id);
                else renderGrid();
            } else renderGrid();
        }

        removeCurrentBtn.addEventListener('click', () => removeImage(selectedId));
        backToGridBtn.addEventListener('click', renderGrid);
        clearBtn.addEventListener('click', () => { uploadedImages = []; updateButtonVisibility(); renderGrid(); });

        detailView.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.0015;
            let newScale = scale - (e.deltaY * zoomSensitivity);
            newScale = Math.min(Math.max(0.01, newScale), 10);
            scale = newScale;
            updateDetailStyling();
        });

        detailView.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            detailView.classList.replace('cursor-grab', 'cursor-grabbing');
            startX = e.clientX; startY = e.clientY;
            initialPanX = panX; initialPanY = panY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = initialPanX + (e.clientX - startX);
            panY = initialPanY + (e.clientY - startY);
            updateDetailStyling();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            detailView.classList.replace('cursor-grabbing', 'cursor-grab');
        });

        function getFileMeta(filename) {
            const lastDot = filename.lastIndexOf('.');
            return { base: lastDot === -1 ? filename : filename.substring(0, lastDot), ext: lastDot === -1 ? 'jpg' : filename.substring(lastDot + 1) };
        }

        function processHighResImage(imgItem) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = imgItem.previewUrl;
                img.onload = () => {
                    const ctx = processingCanvas.getContext('2d');
                    const borderW = imgItem.borderW;
                    const radius = imgItem.radius;
                    const outerRadius = imgItem.outerRadius;
                    const destW = imgItem.naturalWidth + (borderW * 2);
                    const destH = imgItem.naturalHeight + (borderW * 2);

                    processingCanvas.width = destW;
                    processingCanvas.height = destH;

                    // Draw Rounded Background
                    ctx.fillStyle = imgItem.color;
                    ctx.beginPath();
                    ctx.roundRect(0, 0, destW, destH, outerRadius);
                    ctx.fill();

                    // Draw Image Inner
                    ctx.save();
                    if (radius > 0) {
                        ctx.beginPath();
                        ctx.roundRect(borderW, borderW, imgItem.naturalWidth, imgItem.naturalHeight, radius);
                        ctx.clip();
                    }
                    ctx.drawImage(img, borderW, borderW, imgItem.naturalWidth, imgItem.naturalHeight);
                    ctx.restore();

                    const meta = getFileMeta(imgItem.name);
                    const hexName = imgItem.color.replace('#', '').toLowerCase();
                    const cleanFileName = `${meta.base}_border_${hexName}_${borderW}px.${meta.ext}`;
                    const exportType = imgItem.type === 'image/png' ? 'image/png' : 'image/jpeg';
                    processingCanvas.toBlob((blob) => resolve({ blob, fileName: cleanFileName }), exportType, 1.0);
                };
            });
        }

        async function downloadSingle(id) {
            const item = uploadedImages.find(img => img.id === id);
            if (!item) return;
            const { blob, fileName } = await processHighResImage(item);
            triggerDownload(blob, fileName);
        }

        function triggerDownload(blob, fileName) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        downloadAllBtn.addEventListener('click', async () => {
            if (!uploadedImages.length) return;
            downloadAllBtn.disabled = true;
            downloadAllBtn.textContent = 'Processing ZIP...';
            const zip = new JSZip();
            for (let item of uploadedImages) {
                const { blob, fileName } = await processHighResImage(item);
                zip.file(fileName, blob);
            }
            zip.generateAsync({ type: 'blob' }).then((content) => {
                triggerDownload(content, `border_brush_export_${Date.now()}.zip`);
                downloadAllBtn.disabled = false;
                downloadAllBtn.textContent = 'Download All (.zip)';
            });
        });
    </script>
</body>
</html>
